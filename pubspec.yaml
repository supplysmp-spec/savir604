    - assets/images/perfume_flow/
    - assets/images/sale.png
    - assets/developer.jpg
    - assets/images/Capture.PNG
    - assets/images/Capture2.PNG
    - assets/images/Capture3.PNG
    - assets/images/globe.gif
    - assets/images/logo1.png
    - assets/images/avatar.png
    - assets/images/am.gif
    - assets/images/egypt-flag-gif.gif
    - assets/images/006-delivery.png
    - assets/images/egypt.png
    - assets/images/amrica.png
    - assets/images/franch.png
    - assets/images/germany.png
    - assets/images/italya.png
    - assets/images/logo.png
    - assets/images/on1.png
    - assets/images/on2.png
    - assets/images/on3.png
    - assets/json/
    - assets/audio/

  fonts:
    - family: myfont
      fonts:
        - asset: assets/fonts/SourceSerif4_18pt-SemiBold.ttf
    - family: displayfont
      fonts:
        - asset: assets/fonts/Oswald-VariableFont_wght.ttf
