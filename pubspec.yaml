  audioplayers: ^6.5.1
  record: ^6.1.2
  emoji_picker_flutter: ^4.3.0
  firebase_core: ^4.2.0
  firebase_auth: ^6.0.3
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^19.4.0
  image_picker: ^1.2.1
  google_mlkit_face_detection: ^0.13.1
  latlong2: ^0.9.1
  flutter_map: ^8.2.2
  animate_do: ^4.2.0
  permission_handler: ^11.3.1
  crypto: ^3.0.6
  share_plus: ^10.0.2
